<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listas</title>
</head>
<body>
    <h1>Trabalhando com listas</h1> 
    <h2>Listas ordenadas</h2>
    <ol> 
        <li>Acordar 
        <li>Tomar café 
        <li>Escovar os dentes 
    </ol>
    <h2>Lista não ordenada</h2>
    <ul>
        <li>Pão</li>
        <li>leite</li>
        <li>óleo</li>
    </ul>
</body>
</html>
